<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Brief Match - BETA 2.4 Restoration</title>
    <style>
        :root {
            --card-width: 57mm;
            --card-height: 89mm;
            --card-radius: 6.999mm;
            --main-lilla: #dcb8ff; 
            --cream-front: #f2efea;
            --text-grey: #636e72;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f0f9;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .deck-wrapper {
            position: relative;
            width: 80vw;
            max-width: var(--card-width);
            aspect-ratio: 57 / 89;
            perspective: 1200px;
        }

        .deck-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--main-lilla);
            border-radius: var(--card-radius);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1;
        }
        .shadow-1 { transform: translate(6px, 6px) rotate(2deg); }
        .shadow-2 { transform: translate(-4px, 4px) rotate(-1.5deg); }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            z-index: 10;
        }

        .card-container.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--card-radius);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.2);
            overflow: hidden;
        }

        .card-back {
            background-color: var(--main-lilla);
            justify-content: center;
            align-items: center;
        }

        .stella-bg {
            width: 70%;
            height: auto;
            pointer-events: none;
        }

        .card-front {
            background-color: var(--cream-front);
            color: #2d3436;
            transform: rotateY(180deg);
        }

        .section {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .label {
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            background-color: var(--main-lilla); 
            color: var(--cream-front);
            padding: 6px 18px; 
            border-radius: 20px;
        }

        .text { font-size: 0.95rem; font-weight: 500; line-height: 1.4; color: #2d3436; }

        .divider {
            height: 2pt;
            background-color: var(--main-lilla); 
            width: 80%;
            align-self: center;
            border: none;
            opacity: 0.6;
        }

        #instruction {
            margin-top: 50px; 
            font-size: 0.65rem;
            color: #b2bec3;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="deck-wrapper">
    <div class="deck-shadow shadow-1"></div>
    <div class="deck-shadow shadow-2"></div>

    <div class="card-container" id="mainCard">
        <div class="card-face card-back">
            <svg class="stella-bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 126.9 125.7">
                <path fill="#cba6f7" d="M63 41 89 0 79 47l48-5-43 22 34 34-44-20-5 48-12-47-40 26 28-38L0 51l48-2L32 4z"/>
            </svg>
        </div>
        
        <div class="card-face card-front">
            <div class="section">
                <span class="label">Cliente</span>
                <div class="text" id="textClienti">...</div>
            </div>
            <div class="divider"></div>
            <div class="section">
                <span class="label">Designer</span>
                <div class="text" id="textDesigner">...</div>
            </div>
        </div>
    </div>
</div>

<div id="instruction">Clicca per pescare</div>

<script>
    const imprevistiClienti = [
        "Chiede un 'piccolo cambio' di venerdì.",
        "Il cliente sparisce per 3 giorni.",
        "Feedback: 'Non so, non mi convince'.",
        "Budget raddoppiato: pesca un premio.",
        "Ti manda le foto dentro un file Word."
    ];

    const imprevistiDesigner = [
        "Photoshop crasha prima del salvataggio.",
        "Ti accorgi di un typo dopo la stampa.",
        "Il font che ami è a pagamento.",
        "L'ispirazione svanisce: salta il turno.",
        "Trovi il pennello perfetto: +1 mossa."
    ];

    const card = document.getElementById('mainCard');
    const displayDesigner = document.getElementById('textDesigner');
    const displayClienti = document.getElementById('textClienti');
    const instruction = document.getElementById('instruction');

    card.addEventListener('click', () => {
        if (!card.classList.contains('is-flipped')) {
            displayClienti.innerText = imprevistiClienti[Math.floor(Math.random() * imprevistiClienti.length)];
            displayDesigner.innerText = imprevistiDesigner[Math.floor(Math.random() * imprevistiDesigner.length)];
            card.classList.add('is-flipped');
            instruction.innerText = "Clicca per mischiare";
        } else {
            card.classList.remove('is-flipped');
            instruction.innerText = "Clicca per pescare";
        }
    });
</script>

</body>
</html>
